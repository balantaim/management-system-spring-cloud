server:
  port: 8888
spring:
  application:
    name: management-system-config-server
  profiles:
    active: vault
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
# TODO where is management-system.p12

encrypt:
  key-store:
    location: classpath:management-system.p12
    password: ${KEYSTORE-PASSWORD}
    alias: management-system-key
    secret: ${KEYSTORE-SECRET-PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info,busrefresh,mappings,env
  endpoint:
    health:
      show-details: always