spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    config:
      enabled: true
      fail-fast: true
      retry:
        max-attempts: 4
        initial-interval: 1000
        multiplier: 1.5
        max-interval: 6000
