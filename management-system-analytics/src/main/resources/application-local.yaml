spring:
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
#  h2:
#    console:
#      enabled: true
#      path: /h2-console
#      # Do NOT use in production (Allow h2 connection from API Gateway)
#      settings:
#        web-allow-others: true
  cloud:
    function:
      definition: userRegisteredConsumer;userLoginConsumer
    stream:
      bindings:
        # The name should be exact name of the method handler in KafkaListener!
        # The value of '0' represents first froup. We could have multiple groups.
        userRegisteredConsumer-in-0:
          destination: user-registration
          content-type: application/json
        userLoginConsumer-in-0:
          destination: user-login
          content-type: application/json
      kafka:
        streams:
          binder:
            brokers: localhost:9092
            # Do NOT use `application-id` for more than 1 binding, instead use unique `applicationId` inside `bindings`
#            application-id: management-system-analytics
            configuration:
              default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
              default.value.serde: org.springframework.kafka.support.serializer.JsonSerde
              spring.json.trusted.packages: com.martinatanasov.management.system.analytics.events
              spring.json.value.default.type: com.martinatanasov.management.system.analytics.events.RegisterEvent
          bindings:
            # Consumer 1 userRegisteredConsumer, group 1
            userRegisteredConsumer-in-0:
              consumer:
                applicationId: management-system-analytics-register
                valueSerde: org.springframework.kafka.support.serializer.JsonSerde
                configuration:
                  spring.json.value.default.type: com.martinatanasov.management.system.analytics.events.RegisterEvent
            # Consumer 2 userLoginConsumer, group 1
            userLoginConsumer-in-0:
              consumer:
                applicationId: management-system-analytics-login
                valueSerde: org.springframework.kafka.support.serializer.JsonSerde
                configuration:
                  spring.json.value.default.type: com.martinatanasov.management.system.analytics.events.LoginEvent

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: true
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  sql:
    init:
      mode: always
      platform: postgresql
      schema-locations: classpath:schema.sql
#      data-locations: classpath:data.sql
  datasource:
    name: user_analytics
    url: jdbc:h2:mem:user_analytics;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings,refresh
  endpoint:
    health:
      show-details: always
logging:
  level:
    org:
      hibernate:
        sql: DEBUG
      springframework:
        security: TRACE
        jdbc: TRACE
        h2: TRACE