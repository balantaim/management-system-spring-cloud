server:
  port: ${PORT:0}
spring:
  profiles:
    active: local
  application:
    name: management-system-users
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: false
  # Message broker required for busrefresh
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:user}
    password: ${RABBITMQ_PASSWORD:password}
login:
  url: /auth/login
token:
  expiration-time: 3600000
  issuer: "Management system"

authorization:
  token:
    header:
      name: Authorization
      prefix: "Bearer "
encrypt:
  key-store:
    location: classpath:management-system.p12
    password: ${KEYSTORE-PASSWORD}
    alias: management-system-key
    secret: ${KEYSTORE-SECRET-PASSWORD}
