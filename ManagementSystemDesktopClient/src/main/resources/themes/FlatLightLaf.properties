# Base theme
@baseTheme = light

# GLOBAL COLORS
#@accentColor = #4A90E2
#@primaryColor = #2563EB

#Component.focusColor = @accentColor
#Component.focusedBorderColor = @accentColor
Component.arc = 6

# BUTTON
#Button.background = @primaryColor
#Button.foreground = #FFFFFF
Button.arc = 8
#Button.borderWidth = 0
#Button.focusedBackground = lighten(@primaryColor,10%)
#Button.hoverBackground = lighten(@primaryColor,5%)

Button.minimumHeight = 40
Button.minimumWidth = 140

# TEXT FIELD
TextComponent.arc = 8
#TextComponent.borderWidth = 1
#TextComponent.focusedBorderColor = @accentColor
TextField.margin=6,10,6,10

#TextField.minimumHeight = 38
#PasswordField.minimumHeight = 38

# PASSWORD FIELD
#PasswordField.showCapsLock = true
PasswordField.margin=6,10,6,10

# OPTIONAL FONT
#defaultFont = 14 "Inter"

FormattedTextField.margin=6,10,6,10

PasswordField.revealIcon=com.martinatanasov.uicomponents.PasswordRevealIcon

[style]ToggleButton.revealButton=\
  border:4,0,4,6;\
  toolbar.selectedBackground:null;\
  toolbar.hoverBackground:null;\
  toolbar.pressedBackground:null;
